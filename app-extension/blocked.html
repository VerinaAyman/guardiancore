<!doctype html>
<html>
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Content Blocked - GuardianCore</title>
    <style>
      :root { --bg:#0f172a; --accent:#6366f1; --accent-rgb:99,102,241; --panel:#1e293b; --panel-alt:#162132; --danger:#ef4444; --warn:#f59e0b; --radius:20px; --text:#f1f5f9; --text-dim:#94a3b8; }
      * { box-sizing:border-box; }
      body { margin:0; font-family: system-ui,-apple-system,'Segoe UI',Roboto,sans-serif; min-height:100vh; display:flex; align-items:center; justify-content:center; background:radial-gradient(circle at 70% 20%,rgba(99,102,241,.25),transparent 60%) #0f172a; color:var(--text); -webkit-font-smoothing:antialiased; }
      .container { width:100%; max-width:560px; background:linear-gradient(145deg,#1b2736,#141e29); border:1px solid #243445; border-radius:var(--radius); padding:56px 54px 52px; position:relative; box-shadow:0 28px 80px -35px rgba(0,0,0,.75),0 12px 40px -18px rgba(0,0,0,.6); overflow:hidden; }
      .container:before { content:""; position:absolute; inset:0; background:radial-gradient(circle at 85% 10%,rgba(255,255,255,.12),transparent 65%); mix-blend-mode:overlay; pointer-events:none; }
      .icon { font-size:70px; line-height:1; margin:0 0 30px; filter:drop-shadow(0 6px 14px rgba(0,0,0,.45)); }
      h1 { margin:0 0 20px; font-size:38px; font-weight:650; letter-spacing:.5px; background:linear-gradient(95deg,#ffffff,#c7d2fe); -webkit-background-clip:text; background-clip:text; color:transparent; }
      .reason { font-size:19px; line-height:1.55; margin:0 0 26px; color:var(--text-dim); font-weight:400; }
      .category { display:inline-block; padding:8px 18px 9px; font-size:12px; font-weight:600; letter-spacing:.18em; text-transform:uppercase; border-radius:40px; background:rgba(99,102,241,.15); color:var(--accent); border:1px solid rgba(99,102,241,.35); margin:0 0 30px; }
      .info { background:linear-gradient(140deg,#2c1f07,#3a2909); border:1px solid rgba(245,158,11,.45); border-radius:16px; padding:20px 22px 18px; font-size:14px; line-height:1.55; color:#fcd34d; position:relative; }
      .info:before { content:""; position:absolute; inset:0; background:radial-gradient(circle at 90% 12%,rgba(245,158,11,.35),transparent 65%); mix-blend-mode:overlay; }
      .info strong { display:block; font-size:13px; letter-spacing:.2em; text-transform:uppercase; color:#fde68a; margin:0 0 10px; }
      button { appearance:none; border:none; background:linear-gradient(135deg,#6366f1,#8b5cf6); color:#fff; font-size:15px; font-weight:600; letter-spacing:.4px; padding:14px 28px; border-radius:14px; cursor:pointer; margin-top:34px; box-shadow:0 8px 24px -10px rgba(99,102,241,.65); transition:.35s cubic-bezier(.4,.2,.2,1); }
      button:hover { transform:translateY(-3px); box-shadow:0 14px 32px -12px rgba(99,102,241,.75); }
      button:active { transform:translateY(0); }
      footer { margin-top:46px; text-align:center; font-size:11px; letter-spacing:.25em; color:#475569; text-transform:uppercase; }
      footer span { color:#64748b; }
      @media (max-width:640px){ .container{padding:48px 36px 42px;} h1{font-size:34px;} .reason{font-size:18px;} }
      @media (prefers-color-scheme: light){ body{background:linear-gradient(140deg,#e0e7ff,#ede9fe); color:#0f172a;} .container{background:#ffffff;border-color:#e2e8f0;} h1{background:linear-gradient(95deg,#334155,#0f172a);-webkit-background-clip:text;background-clip:text;} .reason{color:#475569;} .info{background:#fef3c7;color:#854d0e;border-color:#fcd34d;} .category{background:#e0e7ff;color:#4338ca;border-color:#c7d2fe;} }
    </style>
  </head>
  <body>
    <div class="container">
      <h1>Content Blocked</h1>
      <div class="reason" id="reason">This content has been blocked by parental controls.</div>
      <div class="category" id="category">Restricted Content</div>
      <div class="info">
        <strong>Why am I seeing this?</strong>
        <p>A parent or guardian has set up rules to protect you from certain types of content. This helps ensure a safer browsing experience.</p>
      </div>
      <footer><span>GuardianCore</span> — safer browsing, clearly explained.</footer>
    </div>
    <script src="blocked.js"></script>
  </body>
</html>
