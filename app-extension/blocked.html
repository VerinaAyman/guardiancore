<!doctype html>
<html>
  <head>
    <meta charset="utf-8">
    <title>Content Blocked - GuardianCore</title>
    <style>
      body {
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        margin: 0;
        padding: 0;
        display: flex;
        align-items: center;
        justify-content: center;
        min-height: 100vh;
      }
      .container {
        background: white;
        border-radius: 12px;
        padding: 48px;
        max-width: 500px;
        box-shadow: 0 20px 60px rgba(0,0,0,0.3);
        text-align: center;
      }
      .icon {
        font-size: 64px;
        margin-bottom: 24px;
      }
      h1 {
        margin: 0 0 16px 0;
        color: #1e293b;
        font-size: 32px;
        font-weight: 700;
      }
      .reason {
        font-size: 18px;
        color: #475569;
        margin-bottom: 24px;
        line-height: 1.6;
      }
      .category {
        display: inline-block;
        background: #f1f5f9;
        color: #64748b;
        padding: 6px 12px;
        border-radius: 6px;
        font-size: 14px;
        font-weight: 500;
        margin-bottom: 24px;
      }
      .info {
        background: #fef3c7;
        border: 1px solid #fde047;
        border-radius: 8px;
        padding: 16px;
        margin-top: 24px;
        font-size: 14px;
        color: #854d0e;
        text-align: left;
      }
      .info strong {
        display: block;
        margin-bottom: 8px;
      }
      button {
        background: #3b82f6;
        color: white;
        border: none;
        padding: 12px 24px;
        border-radius: 8px;
        font-size: 16px;
        font-weight: 500;
        cursor: pointer;
        margin-top: 24px;
      }
      button:hover {
        background: #2563eb;
      }
    </style>
  </head>
  <body>
    <div class="container">
      <div class="icon">🛡️</div>
      <h1>Content Blocked</h1>
      <div class="reason" id="reason">This content has been blocked by parental controls.</div>
      <div class="category" id="category">Restricted Content</div>
      <div class="info">
        <strong>Why am I seeing this?</strong>
        <p>A parent or guardian has set up rules to protect you from certain types of content. This helps ensure a safer browsing experience.</p>
      </div>
      <button onclick="history.back()">Go Back</button>
    </div>
    <script src="blocked.js"></script>
  </body>
</html>
