<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>GuardianLens — Page Blocked</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&display=swap');

    * { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --gl-safe:    #22c55e;
      --gl-warn:    #f59e0b;
      --gl-block:   #ef4444;
      --gl-accent:  #6366f1;
      --gl-bg:      #0f172a;
      --gl-surface: #1e293b;
      --gl-surface2:#263347;
      --gl-text:    #f1f5f9;
      --gl-muted:   #94a3b8;
      --gl-border:  rgba(255,255,255,0.08);
      --gl-font:    'Nunito', 'Segoe UI', sans-serif;
      --gl-radius:  20px;
      --gl-shadow:  0 8px 40px rgba(0,0,0,0.6);
    }

    html, body {
      height: 100%;
      font-family: var(--gl-font);
      background: var(--gl-bg);
      color: var(--gl-text);
      -webkit-font-smoothing: antialiased;
    }

    body {
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 16px;
      min-height: 100vh;
      background:
        radial-gradient(ellipse at 20% 20%, rgba(99,102,241,0.12) 0%, transparent 55%),
        radial-gradient(ellipse at 80% 80%, rgba(239,68,68,0.10) 0%, transparent 55%),
        var(--gl-bg);
    }

    /* ── Stars ── */
    .stars {
      position: fixed; inset: 0; pointer-events: none; z-index: 0; overflow: hidden;
    }
    .star {
      position: absolute; border-radius: 50%;
      background: rgba(255,255,255,0.6);
      animation: twinkle var(--d, 3s) ease-in-out infinite var(--delay, 0s);
    }
    @keyframes twinkle { 0%,100%{opacity:0.2;} 50%{opacity:0.9;} }

    .layout {
      position: relative; z-index: 1;
      width: 100%; max-width: 440px;
      display: flex; flex-direction: column; gap: 12px;
    }

    /* ── Top strip ── */
    .topstrip {
      display: flex; align-items: center; gap: 12px;
      padding: 14px 18px;
      background: var(--gl-surface);
      border-radius: var(--gl-radius);
      border: 1px solid var(--gl-border);
      box-shadow: var(--gl-shadow);
    }
    .strip-icon {
      width: 42px; height: 42px; border-radius: 50%;
      background: rgba(239,68,68,0.15);
      border: 1.5px solid rgba(239,68,68,0.3);
      display: flex; align-items: center; justify-content: center;
      font-size: 20px; flex-shrink: 0;
      animation: float 3s ease-in-out infinite;
    }
    @keyframes float { 0%,100%{transform:translateY(0);} 50%{transform:translateY(-5px);} }
    .strip-meta { flex: 1; }
    .strip-title { font-size: 14px; font-weight: 900; color: var(--gl-text); }
    .strip-sub   { font-size: 11px; color: var(--gl-muted); margin-top: 1px; }
    .strip-badge {
      font-size: 11px; font-weight: 800;
      padding: 4px 12px; border-radius: 20px;
      background: rgba(239,68,68,0.15);
      color: var(--gl-block);
      border: 1px solid rgba(239,68,68,0.3);
      white-space: nowrap;
    }

    /* ── Chat card ── */
    .chat-card {
      background: var(--gl-surface);
      border-radius: var(--gl-radius);
      border: 1px solid var(--gl-border);
      box-shadow: var(--gl-shadow);
      overflow: hidden;
      display: flex; flex-direction: column;
    }

    .chat-topbar {
      background: linear-gradient(135deg, #4338ca, var(--gl-accent));
      padding: 14px 18px;
      display: flex; align-items: center; gap: 12px;
    }
    .chat-av {
      width: 36px; height: 36px; border-radius: 50%;
      background: rgba(255,255,255,0.15);
      display: flex; align-items: center; justify-content: center;
      font-size: 18px; flex-shrink: 0;
    }
    .chat-meta { flex: 1; }
    .chat-name { font-size: 14px; font-weight: 900; color: #fff; }
    .chat-sub  { font-size: 10px; color: rgba(255,255,255,0.65); }
    .online-dot {
      width: 9px; height: 9px; border-radius: 50%;
      background: #4ade80;
      box-shadow: 0 0 8px #4ade80;
    }

    #chat-box {
      min-height: 240px; max-height: 280px;
      overflow-y: auto;
      padding: 14px 12px;
      display: flex; flex-direction: column; gap: 10px;
      background: var(--gl-bg);
    }
    #chat-box::-webkit-scrollbar { width: 4px; }
    #chat-box::-webkit-scrollbar-thumb { background: rgba(99,102,241,0.25); border-radius: 4px; }

    .msg-row { display: flex; gap: 8px; align-items: flex-end; }
    .msg-row.bot  { flex-direction: row; }
    .msg-row.user { flex-direction: row-reverse; }
    .msg-av {
      width: 28px; height: 28px; border-radius: 50%;
      background: rgba(99,102,241,0.15);
      border: 1px solid rgba(99,102,241,0.2);
      display: flex; align-items: center; justify-content: center;
      font-size: 14px; flex-shrink: 0;
    }
    .msg-bub {
      max-width: 82%; padding: 10px 14px;
      font-size: 13.5px; line-height: 1.55;
      border-radius: 18px; word-break: break-word;
      font-family: var(--gl-font); font-weight: 600;
    }
    .msg-row.bot .msg-bub {
      background: var(--gl-surface);
      color: var(--gl-text);
      border-bottom-left-radius: 4px;
      border: 1px solid var(--gl-border);
    }
    .msg-row.user .msg-bub {
      background: var(--gl-accent);
      color: #fff;
      border-bottom-right-radius: 4px;
    }

    /* typing indicator */
    .typing {
      display: flex; gap: 4px; align-items: center;
      background: var(--gl-surface);
      border: 1px solid var(--gl-border);
      border-radius: 18px; border-bottom-left-radius: 4px;
      padding: 10px 14px; max-width: 60px;
    }
    .typing span {
      width: 6px; height: 6px; border-radius: 50%;
      background: var(--gl-accent); opacity: 0.4;
      animation: blink 1.2s infinite;
    }
    .typing span:nth-child(2) { animation-delay: 0.2s; }
    .typing span:nth-child(3) { animation-delay: 0.4s; }
    @keyframes blink { 0%,80%,100%{opacity:0.3;} 40%{opacity:1;} }

    .chat-inputbar {
      background: var(--gl-surface);
      border-top: 1px solid var(--gl-border);
      padding: 10px 12px;
      display: flex; gap: 8px; align-items: center;
    }
    #chat-input {
      flex: 1;
      background: var(--gl-surface2);
      border: 1.5px solid var(--gl-border);
      border-radius: 20px;
      padding: 9px 16px;
      font-size: 13.5px;
      font-family: var(--gl-font);
      font-weight: 600;
      color: var(--gl-text);
      outline: none;
      transition: border 0.15s;
    }
    #chat-input::placeholder { color: var(--gl-muted); }
    #chat-input:focus { border-color: var(--gl-accent); }
    #chat-input:disabled { opacity: 0.4; }

    #send-btn {
      width: 38px; height: 38px; border-radius: 50%;
      background: var(--gl-accent); border: none;
      cursor: pointer; display: flex; align-items: center; justify-content: center;
      font-size: 16px; color: #fff; flex-shrink: 0;
      transition: background 0.15s, transform 0.1s;
      box-shadow: 0 2px 12px rgba(99,102,241,0.4);
    }
    #send-btn:hover  { background: #4f46e5; transform: scale(1.05); }
    #send-btn:active { transform: scale(0.95); }
    #send-btn:disabled { opacity: 0.35; pointer-events: none; }

    /* ── Action buttons ── */
    .actions { display: flex; gap: 10px; }
    .btn {
      flex: 1; padding: 13px 10px;
      border-radius: 14px;
      font-size: 13.5px; font-weight: 800;
      font-family: var(--gl-font);
      cursor: pointer; border: none;
      transition: opacity 0.15s, transform 0.1s;
      letter-spacing: 0.01em;
    }
    .btn:hover  { opacity: 0.88; transform: translateY(-1px); }
    .btn:active { transform: translateY(0) scale(0.97); }
    .btn-back { background: var(--gl-safe); color: #fff; box-shadow: 0 2px 12px rgba(34,197,94,0.35); }
    .btn-home { background: var(--gl-surface); color: var(--gl-text); border: 1px solid var(--gl-border); }

    /* ── Footer ── */
    .footer {
      text-align: center;
      font-size: 10px; letter-spacing: 0.15em;
      color: var(--gl-muted);
      text-transform: uppercase;
      font-weight: 700;
    }
  </style>
</head>
<body>

<!-- Star field -->
<div class="stars" id="stars"></div>

<div class="layout">

  <div class="topstrip">
    <div class="strip-icon">🛡️</div>
    <div class="strip-meta">
      <div class="strip-title" id="blocked-domain">This page was blocked</div>
      <div class="strip-sub">GuardianLens · content protection</div>
    </div>
    <div class="strip-badge" id="category-badge">Restricted</div>
  </div>

  <div class="chat-card">
    <div class="chat-topbar">
      <div class="chat-av">🛡️</div>
      <div class="chat-meta">
        <div class="chat-name">Lens — your web buddy</div>
        <div class="chat-sub">here to explain & help</div>
      </div>
      <div class="online-dot"></div>
    </div>

    <div id="chat-box"></div>

    <div class="chat-inputbar">
      <input id="chat-input" type="text" placeholder="Ask Lens anything…" autocomplete="off" />
      <button id="send-btn">➤</button>
    </div>
  </div>

  <div class="actions">
    <button class="btn btn-back" id="btn-back">← Go back</button>
    <button class="btn btn-home" id="btn-home">🏠 Go to Google</button>
  </div>

  <p class="footer">GuardianLens · safer browsing, clearly explained</p>

</div>

<script src="blocked.js" defer></script>

<script>
  // ── Star field generator ──
  const starsEl = document.getElementById('stars');
  for (let i = 0; i < 55; i++) {
    const s = document.createElement('div');
    s.className = 'star';
    const size = Math.random() * 2.5 + 1;
    s.style.cssText = `
      width:${size}px; height:${size}px;
      left:${Math.random()*100}%; top:${Math.random()*100}%;
      --d:${(Math.random()*3+2).toFixed(1)}s;
      --delay:-${(Math.random()*4).toFixed(1)}s;
    `;
    starsEl.appendChild(s);
  }

  // ── Parse URL params ──
  const params   = new URLSearchParams(location.search);
  const category = params.get('category') || 'Restricted content';
  const reason   = params.get('reason')   || '';
  const blockedUrl = params.get('url')    || '';

  // ── Populate strip ──
  let domain = 'This page';
  try { domain = new URL(blockedUrl).hostname.replace(/^www\./, ''); } catch {}
  document.getElementById('blocked-domain').textContent = domain || 'This page was blocked';
  document.getElementById('category-badge').textContent = category;

  // ── Action buttons ──
  document.getElementById('btn-back').addEventListener('click', () => {
    if (history.length > 1) history.back();
    else window.close();
  });
  document.getElementById('btn-home').addEventListener('click', () => {
    window.location.href = 'https://www.google.com';
  });

  // ── Chat init (fallback if blocked.js not present or fails) ──
  const chatBox = document.getElementById('chat-box');

  function addMsg(text, who = 'bot') {
    const row = document.createElement('div');
    row.className = `msg-row ${who}`;
    const av = document.createElement('div');
    av.className = 'msg-av';
    av.textContent = who === 'bot' ? '🛡️' : '🧒';
    const bub = document.createElement('div');
    bub.className = 'msg-bub';
    bub.textContent = text;
    row.appendChild(av);
    row.appendChild(bub);
    chatBox.appendChild(row);
    chatBox.scrollTop = chatBox.scrollHeight;
  }

  function showTyping() {
    const row = document.createElement('div');
    row.className = 'msg-row bot'; row.id = 'typing-row';
    const av = document.createElement('div');
    av.className = 'msg-av'; av.textContent = '🛡️';
    const t = document.createElement('div');
    t.className = 'typing';
    t.innerHTML = '<span></span><span></span><span></span>';
    row.appendChild(av); row.appendChild(t);
    chatBox.appendChild(row);
    chatBox.scrollTop = chatBox.scrollHeight;
  }

  function removeTyping() {
    document.getElementById('typing-row')?.remove();
  }

  // Opening message
  const openingMsg = reason
    ? `Hey there! 👋 I blocked ${domain || 'this page'} because: ${reason}. Got any questions?`
    : `Hey there! 👋 I blocked ${domain || 'this page'} to keep you safe. The content was flagged as "${category}". Want to talk about it?`;

  setTimeout(() => addMsg(openingMsg), 300);

  // ── Chat input (calls background via chrome.runtime if available) ──
  const input   = document.getElementById('chat-input');
  const sendBtn = document.getElementById('send-btn');

  async function sendChat() {
    const text = input.value.trim();
    if (!text) return;
    addMsg(text, 'user');
    input.value = '';
    input.disabled = true;
    sendBtn.disabled = true;
    showTyping();

    try {
      const reply = await new Promise((resolve, reject) => {
        const timeout = setTimeout(() => reject(new Error('timeout')), 15000);
        chrome.runtime.sendMessage({
          type: 'LENS_GROQ_REQUEST',
          systemPrompt: `You are Lens, GuardianLens's friendly and caring web buddy for children. 
You blocked ${domain || 'a website'} because it was categorised as "${category}". 
${reason ? 'The reason was: ' + reason + '.' : ''}
Explain kindly and simply why the site was blocked. Keep responses short (2–3 sentences max), warm, and age-appropriate. Use 1 emoji per message. Never use scary language.`,
          history: [{ role: 'user', content: text }]
        }, (res) => {
          clearTimeout(timeout);
          if (chrome.runtime.lastError) reject(chrome.runtime.lastError);
          else resolve(res?.reply || "I'm having a little hiccup! Try asking again in a moment 🌀");
        });
      });
      removeTyping();
      addMsg(reply);
    } catch {
      removeTyping();
      addMsg("I'm having trouble connecting right now. You can ask a trusted adult for help! 💙");
    } finally {
      input.disabled = false;
      sendBtn.disabled = false;
      input.focus();
    }
  }

  sendBtn.addEventListener('click', sendChat);
  input.addEventListener('keydown', (e) => { if (e.key === 'Enter') sendChat(); });
</script>

</body>
</html>
