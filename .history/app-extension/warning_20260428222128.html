<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'nonce-gl-inline'; style-src 'self' 'nonce-gl-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data:; connect-src 'self' https://api.groq.com https://api.emailjs.com https://guardiancore.onrender.com https://*.onrender.com; object-src 'none'; base-uri 'self'" />
  <title>Heads Up! · GuardianLens</title>
  <link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <style nonce="gl-inline">
    :root {
      --bg:         #080e1a;
      --surface:    #0f172a;
      --surface2:   #1e293b;
      --surface3:   #263045;
      --border:     rgba(99,102,241,.18);
      --border2:    rgba(255,255,255,.06);
      --accent:     #6366f1;
      --accent-glow:#818cf8;
      --danger:     #f43f5e;
      --danger-dim: rgba(244,63,94,.15);
      --warn:       #f59e0b;
      --warn-dim:   rgba(245,158,11,.12);
      --ok:         #10b981;
      --text:       #f1f5f9;
      --muted:      #94a3b8;
      --dim:        #475569;
      --mono:       'JetBrains Mono', monospace;
      --sans:       'Sora', sans-serif;
      --radius:     14px;
      --radius-sm:  8px;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: var(--sans);
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex; align-items: center; justify-content: center;
      overflow: hidden; position: relative;
    }
    .bg-orb { position:fixed;border-radius:50%;filter:blur(90px);pointer-events:none;z-index:0; }
    .bg-orb-1 {
      width:500px;height:500px;
      background:radial-gradient(circle,rgba(245,158,11,.1) 0%,transparent 70%);
      top:-150px;left:-150px;animation:orbDrift1 18s ease-in-out infinite alternate;
    }
    .bg-orb-2 {
      width:400px;height:400px;
      background:radial-gradient(circle,rgba(99,102,241,.08) 0%,transparent 70%);
      bottom:-100px;right:-100px;animation:orbDrift2 22s ease-in-out infinite alternate;
    }
    @keyframes orbDrift1 { to{transform:translate(60px,80px)} }
    @keyframes orbDrift2 { to{transform:translate(-40px,-60px)} }
    body::before {
      content:'';position:fixed;inset:0;z-index:0;
      background-image:linear-gradient(rgba(99,102,241,.04) 1px,transparent 1px),linear-gradient(90deg,rgba(99,102,241,.04) 1px,transparent 1px);
      background-size:48px 48px;pointer-events:none;
    }
    .star{position:fixed;pointer-events:none;z-index:0;opacity:0;font-size:1.2rem;animation:starFloat 6s ease-in-out infinite;}
    @keyframes starFloat{0%{opacity:0;transform:translateY(0) scale(.5)}20%{opacity:.6}80%{opacity:.3}100%{opacity:0;transform:translateY(-120px) scale(1.2) rotate(30deg)}}

    .page {
      position:relative;z-index:1;
      width:100%;max-width:960px;
      padding:24px 20px;
      display:grid;
      grid-template-columns:1fr 380px;
      gap:16px;
      min-height:100vh;
      align-content:center;
    }
    @media(max-width:780px){
      .page{grid-template-columns:1fr;min-height:auto;padding-bottom:40px;}
      .chat-panel{height:420px;}
    }

    /* Warning Card */
    .warn-card {
      grid-column:1;
      background:linear-gradient(135deg,rgba(15,23,42,.95),rgba(30,41,59,.9));
      border:1px solid rgba(245,158,11,.2);
      border-radius:20px;
      padding:36px 32px;
      backdrop-filter:blur(20px);
      animation:cardSlideIn .5s cubic-bezier(.34,1.56,.64,1) both;
      box-shadow:0 0 0 1px rgba(245,158,11,.08),0 32px 64px rgba(0,0,0,.4);
    }
    @keyframes cardSlideIn{from{opacity:0;transform:translateY(28px) scale(.97)}to{opacity:1;transform:none}}

    /* Animated warning icon */
    .warn-icon-wrap {
      display:flex;align-items:center;gap:16px;margin-bottom:28px;
    }
    .warn-icon {
      width:64px;height:64px;flex-shrink:0;position:relative;
      animation:iconBounce .7s cubic-bezier(.34,1.56,.64,1) .1s both;
    }
    @keyframes iconBounce{from{opacity:0;transform:scale(.3) rotate(-15deg)}to{opacity:1;transform:scale(1) rotate(0)}}
    .warn-icon-inner {
      width:100%;height:100%;border-radius:16px;
      background:linear-gradient(135deg,rgba(245,158,11,.25),rgba(245,158,11,.1));
      border:2px solid rgba(245,158,11,.5);
      display:flex;align-items:center;justify-content:center;
      font-size:1.8rem;
      animation:warnPulse 2s ease-in-out infinite;
    }
    @keyframes warnPulse{0%,100%{box-shadow:0 0 0 0 rgba(245,158,11,.4)}50%{box-shadow:0 0 0 12px rgba(245,158,11,0)}}
    .warn-rings {
      position:absolute;inset:-10px;border-radius:22px;
      border:2px solid rgba(245,158,11,.3);
      animation:ringExpand 2s ease-out infinite;
    }
    .warn-rings-2 {
      position:absolute;inset:-20px;border-radius:28px;
      border:1.5px solid rgba(245,158,11,.15);
      animation:ringExpand 2s ease-out .4s infinite;
    }
    @keyframes ringExpand{0%{opacity:1;transform:scale(.9)}100%{opacity:0;transform:scale(1.3)}}

    .warn-text h1 { font-size:1.45rem;font-weight:700;line-height:1.2;color:var(--warn); }
    .warn-text p  { font-size:.82rem;color:var(--muted);margin-top:4px; }

    .badge-warn {
      display:inline-flex;align-items:center;gap:6px;
      padding:5px 12px;border-radius:20px;
      font-size:.72rem;font-weight:600;letter-spacing:.04em;text-transform:uppercase;
      margin-bottom:24px;
      background:var(--warn-dim);color:var(--warn);border:1px solid rgba(245,158,11,.3);
    }
    .badge-dot-warn { width:6px;height:6px;border-radius:50%;background:var(--warn);animation:blink 1.4s ease-in-out infinite; }
    @keyframes blink{0%,100%{opacity:1}50%{opacity:.2}}

    .info-grid{display:flex;flex-direction:column;gap:10px;margin-bottom:28px;}
    .info-row{display:flex;align-items:flex-start;gap:12px;padding:12px 14px;background:rgba(255,255,255,.03);border:1px solid var(--border2);border-radius:var(--radius-sm);animation:rowIn .4s ease both;}
    .info-row:nth-child(1){animation-delay:.15s}.info-row:nth-child(2){animation-delay:.22s}
    @keyframes rowIn{from{opacity:0;transform:translateX(-10px)}to{opacity:1;transform:none}}
    .info-icon{width:28px;height:28px;border-radius:6px;display:flex;align-items:center;justify-content:center;font-size:.9rem;flex-shrink:0;}
    .info-icon.amber{background:rgba(245,158,11,.12);}
    .info-icon.blue{background:rgba(99,102,241,.15);}
    .info-label{font-size:.68rem;color:var(--dim);font-weight:600;letter-spacing:.06em;text-transform:uppercase;margin-bottom:3px;}
    .info-value{font-size:.88rem;color:var(--text);font-weight:500;word-break:break-all;}
    .info-value.mono{font-family:var(--mono);font-size:.78rem;color:var(--muted);}

    .divider{height:1px;background:var(--border2);margin:0 0 24px;}

    /* Action buttons */
    .action-row { display:flex;gap:10px;animation:rowIn .4s .3s ease both; }

    .btn-proceed {
      flex:1;padding:13px 16px;
      background:rgba(255,255,255,.04);
      border:1px solid var(--border2);border-radius:var(--radius-sm);
      color:var(--muted);font-family:var(--sans);font-size:.88rem;font-weight:600;
      cursor:not-allowed;display:flex;align-items:center;justify-content:center;gap:8px;
      transition:all .2s;
      position:relative;overflow:hidden;
    }
    .btn-proceed.ready {
      cursor:pointer;color:var(--text);border-color:rgba(255,255,255,.15);
      background:rgba(255,255,255,.06);
    }
    .btn-proceed.ready:hover { background:rgba(255,255,255,.1);transform:translateY(-1px); }

    /* Countdown ring */
    .countdown-ring { position:relative;width:24px;height:24px;flex-shrink:0; }
    .countdown-ring svg { position:absolute;top:0;left:0;transform:rotate(-90deg); }
    .countdown-ring .track { fill:none;stroke:rgba(255,255,255,.1);stroke-width:2; }
    .countdown-ring .fill  { fill:none;stroke:var(--warn);stroke-width:2;stroke-linecap:round;stroke-dasharray:63.6;stroke-dashoffset:0;transition:stroke-dashoffset 1s linear; }
    .countdown-num { position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-size:.65rem;font-weight:700;color:var(--warn); }

    .btn-chat {
      flex:1;padding:13px 16px;
      background:linear-gradient(135deg,rgba(99,102,241,.18),rgba(99,102,241,.08));
      border:1px solid rgba(99,102,241,.35);border-radius:var(--radius-sm);
      color:var(--accent-glow);font-family:var(--sans);font-size:.88rem;font-weight:600;
      cursor:pointer;display:flex;align-items:center;justify-content:center;gap:8px;
      transition:all .2s;
    }
    .btn-chat:hover { background:linear-gradient(135deg,rgba(99,102,241,.3),rgba(99,102,241,.15));border-color:rgba(99,102,241,.6);transform:translateY(-1px);box-shadow:0 8px 24px rgba(99,102,241,.2); }

    /* Chat Panel — identical to blocked.html */
    .chat-panel {
      grid-column:2;
      background:linear-gradient(160deg,rgba(15,23,42,.97),rgba(18,27,48,.95));
      border:1px solid var(--border);border-radius:20px;
      display:flex;flex-direction:column;overflow:hidden;
      animation:cardSlideIn .5s cubic-bezier(.34,1.56,.64,1) .1s both;
      box-shadow:0 32px 64px rgba(0,0,0,.35);
      height:560px;
    }
    @media(max-width:780px){.chat-panel{grid-column:1;}}
    .chat-header{padding:16px 18px;border-bottom:1px solid var(--border2);display:flex;align-items:center;gap:10px;flex-shrink:0;}
    .chat-avatar{width:36px;height:36px;border-radius:10px;background:linear-gradient(135deg,#6366f1,#818cf8);display:flex;align-items:center;justify-content:center;font-size:1rem;flex-shrink:0;box-shadow:0 0 16px rgba(99,102,241,.4);}
    .chat-title{font-size:.9rem;font-weight:700;}
    .chat-sub{font-size:.72rem;color:var(--ok);display:flex;align-items:center;gap:4px;}
    .online-dot{width:6px;height:6px;border-radius:50%;background:var(--ok);animation:blink 2s infinite;}
    .chat-messages{flex:1;overflow-y:auto;padding:16px;display:flex;flex-direction:column;gap:12px;scroll-behavior:smooth;}
    .chat-messages::-webkit-scrollbar{width:4px;}
    .chat-messages::-webkit-scrollbar-thumb{background:var(--surface3);border-radius:2px;}
    .msg{max-width:88%;padding:10px 13px;border-radius:12px;font-size:.84rem;line-height:1.55;animation:msgIn .25s ease both;}
    @keyframes msgIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}
    .msg.bot{background:rgba(99,102,241,.1);border:1px solid rgba(99,102,241,.15);color:var(--text);border-bottom-left-radius:4px;align-self:flex-start;}
    .msg.user{background:rgba(99,102,241,.22);border:1px solid rgba(99,102,241,.3);color:var(--text);border-bottom-right-radius:4px;align-self:flex-end;}
    .msg a{color:var(--accent-glow);text-decoration:underline;text-underline-offset:2px;}
    .typing{display:flex;align-items:center;gap:4px;padding:10px 14px;background:rgba(99,102,241,.08);border:1px solid rgba(99,102,241,.12);border-radius:12px;border-bottom-left-radius:4px;align-self:flex-start;width:56px;}
    .typing span{width:6px;height:6px;border-radius:50%;background:var(--accent-glow);animation:typingDot 1.2s ease-in-out infinite;}
    .typing span:nth-child(2){animation-delay:.2s}.typing span:nth-child(3){animation-delay:.4s}
    @keyframes typingDot{0%,60%,100%{transform:translateY(0);opacity:.5}30%{transform:translateY(-5px);opacity:1}}
    .chips{display:flex;flex-wrap:wrap;gap:6px;padding:10px 16px;border-top:1px solid var(--border2);flex-shrink:0;}
    .chip{padding:5px 11px;background:rgba(99,102,241,.1);border:1px solid rgba(99,102,241,.2);border-radius:20px;font-size:.75rem;color:var(--accent-glow);font-family:var(--sans);cursor:pointer;transition:all .15s;white-space:nowrap;}
    .chip:hover{background:rgba(99,102,241,.22);border-color:rgba(99,102,241,.4);transform:translateY(-1px);}
    .chat-input-row{display:flex;gap:8px;padding:12px 16px;border-top:1px solid var(--border2);flex-shrink:0;}
    #chatInput{flex:1;background:rgba(255,255,255,.04);border:1px solid var(--border2);border-radius:var(--radius-sm);color:var(--text);font-family:var(--sans);font-size:.85rem;padding:9px 13px;outline:none;transition:border-color .2s;}
    #chatInput:focus{border-color:rgba(99,102,241,.4);}
    #chatInput::placeholder{color:var(--dim);}
    #sendChat{padding:9px 14px;background:var(--accent);border:none;border-radius:var(--radius-sm);color:#fff;font-size:1rem;cursor:pointer;transition:background .2s,transform .1s;flex-shrink:0;}
    #sendChat:hover{background:var(--accent-glow);transform:scale(1.05);}
    .gl-footer{grid-column:1/-1;text-align:center;font-size:.72rem;color:var(--dim);padding-top:4px;letter-spacing:.03em;}
    .gl-footer strong{color:var(--muted);}
  </style>
</head>
<body>
<div class="bg-orb bg-orb-1"></div>
<div class="bg-orb bg-orb-2"></div>

<div class="page">
  <!-- Warning Card -->
  <div class="warn-card">
    <div class="warn-icon-wrap">
      <div class="warn-icon">
        <div class="warn-rings"></div>
        <div class="warn-rings-2"></div>
        <div class="warn-icon-inner">⚠️</div>
      </div>
      <div class="warn-text">
        <h1>Heads Up!</h1>
        <p>GuardianLens noticed something</p>
      </div>
    </div>

    <div class="badge-warn">
      <div class="badge-dot-warn"></div>
      <span id="badgeCategory">Loading…</span>
    </div>

    <div class="info-grid">
      <div class="info-row">
        <div class="info-icon amber">⚠️</div>
        <div><div class="info-label">Reason</div><div class="info-value" id="infoReason">—</div></div>
      </div>
      <div class="info-row">
        <div class="info-icon blue">🔗</div>
        <div><div class="info-label">URL</div><div class="info-value mono" id="infoUrl">—</div></div>
      </div>
    </div>

    <div class="divider"></div>

    <div class="action-row">
      <button class="btn-proceed" id="proceedBtn" disabled type="button">
        <div class="countdown-ring">
          <svg viewBox="0 0 24 24"><circle class="track" cx="12" cy="12" r="10"/><circle class="fill" id="ringFill" cx="12" cy="12" r="10"/></svg>
          <div class="countdown-num" id="countNum">3</div>
        </div>
        Continue anyway
      </button>
      <button class="btn-chat" id="chatScrollBtn" type="button">🛡️ Talk to GuardianLens</button>
    </div>
  </div>

  <!-- Chat Panel -->
  <div class="chat-panel" id="chatSection">
    <div class="chat-header">
      <div class="chat-avatar">🛡️</div>
      <div>
        <div class="chat-title">GuardianLens</div>
        <div class="chat-sub"><span class="online-dot"></span> Online · Here to help</div>
      </div>
    </div>
    <div class="chat-messages" id="chatMessages"></div>
    <div class="chips" id="quickChips">
      <div class="chip" data-q="Is this site safe for me?">Is it safe?</div>
      <div class="chip" data-q="Show me safer alternatives">Safer alternatives</div>
      <div class="chip" data-q="Why did you warn me?">Why this warning?</div>
    </div>
    <div class="chat-input-row">
      <input id="chatInput" type="text" placeholder="Ask GuardianLens anything…" autocomplete="off" />
      <button id="sendChat" type="button">➤</button>
    </div>
  </div>

  <div class="gl-footer"><strong>GuardianLens</strong> · <span>v0.7.0</span></div>
</div>

<script nonce="gl-inline">
  // ── Audio ──
  const AudioCtx = window.AudioContext || window.webkitAudioContext;
  function playWarn() {
    try {
      const ctx = new AudioCtx();
      [523, 587].forEach((f,i) => {
        const osc = ctx.createOscillator(), gain = ctx.createGain();
        osc.connect(gain); gain.connect(ctx.destination);
        osc.type = 'sine'; osc.frequency.value = f;
        gain.gain.setValueAtTime(0, ctx.currentTime + i * 0.22);
        gain.gain.linearRampToValueAtTime(0.1, ctx.currentTime + i * 0.22 + 0.05);
        gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + i * 0.22 + 0.3);
        osc.start(ctx.currentTime + i * 0.22);
        osc.stop(ctx.currentTime + i * 0.22 + 0.31);
      });
    } catch(e) {}
  }
  function playPop() {
    try {
      const ctx = new AudioCtx(), osc = ctx.createOscillator(), gain = ctx.createGain();
      osc.connect(gain); gain.connect(ctx.destination);
      osc.type='sine'; osc.frequency.value=880;
      gain.gain.setValueAtTime(0.08, ctx.currentTime);
      gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime+0.12);
      osc.start(ctx.currentTime); osc.stop(ctx.currentTime+0.13);
    } catch(e) {}
  }

  // floating stars
  const EMOJIS=['⭐','✨','🌟','💫','🎵','🎈'];
  function spawnStar(){
    const el=document.createElement('div'); el.className='star';
    el.textContent=EMOJIS[Math.floor(Math.random()*EMOJIS.length)];
    el.style.left=Math.random()*95+'vw'; el.style.top=(60+Math.random()*30)+'vh';
    el.style.animationDelay=Math.random()*2+'s'; el.style.animationDuration=(5+Math.random()*4)+'s';
    document.body.appendChild(el); setTimeout(()=>el.remove(),9000);
  }
  setInterval(spawnStar,2800);

  // ── Params ──
  const params   = new URLSearchParams(location.search);
  const category = params.get('category') || 'Caution';
  const reason   = params.get('reason')   || 'This page may contain content that needs a second look.';
  const rawUrl   = params.get('url')      || document.referrer || 'Unknown';
  const proceedUrl = params.get('proceed') || rawUrl;

  let siteDomain = rawUrl;
  try { siteDomain = new URL(rawUrl).hostname.replace('www.',''); } catch(e) {}

  document.getElementById('badgeCategory').textContent = category;
  document.getElementById('infoReason').textContent    = reason;
  document.getElementById('infoUrl').textContent       = rawUrl.length>60 ? rawUrl.slice(0,60)+'…' : rawUrl;

  // ── Countdown (3s) ──
  let countdown = 3;
  const ringFill = document.getElementById('ringFill');
  const countNum = document.getElementById('countNum');
  const proceedBtn = document.getElementById('proceedBtn');
  const circumference = 63.6;
  ringFill.style.strokeDashoffset = 0;

  const timer = setInterval(() => {
    countdown--;
    countNum.textContent = countdown;
    ringFill.style.strokeDashoffset = circumference * (1 - countdown / 3);
    if (countdown <= 0) {
      clearInterval(timer);
      proceedBtn.disabled = false;
      proceedBtn.classList.add('ready');
      countNum.textContent = '✓';
      ringFill.style.stroke = 'var(--ok)';
      playPop();
    }
  }, 1000);

  function proceedToSite() {
    if (!proceedBtn.classList.contains('ready')) return;
    // Notify background that child proceeded past warning
    if (typeof chrome !== 'undefined' && chrome.runtime) {
      chrome.runtime.sendMessage({ type: 'WARN_PROCEED', payload: { url: rawUrl, category, reason } });
    }
    window.location.href = proceedUrl;
  }

  function scrollToChat() {
    document.getElementById('chatSection').scrollIntoView({ behavior:'smooth' });
    playPop();
  }

  // ── Chat ──
  const messagesEl = document.getElementById('chatMessages');
  const history = [];

  const SYSTEM_PROMPT = `You are GuardianLens, a warm and friendly AI assistant in a family safety browser extension for kids.

The child's browser showed a WARNING (not a block) for this specific website:
- Full URL: ${rawUrl}
- Domain: ${siteDomain}
- Category: ${category}
- Reason: ${reason}

The child CAN still proceed to the site — this is a warning, not a block.

Your job:
1. In 1-2 friendly sentences, explain why ${siteDomain} triggered a warning. Be kind and non-scary.
2. Give your honest assessment — is this site probably fine or should they be careful?
3. Suggest 3 safe alternatives that do the same thing as ${siteDomain}, in case they'd prefer those.
4. Format alternatives as: [Site Name](https://url.com) — emoji + short description.

For follow-up questions: be warm, helpful, honest. Never lecture. Keep it short.`;

  function addMsg(role, text) {
    const div = document.createElement('div');
    div.className = 'msg ' + role;
    div.innerHTML = text.replace(/\n/g,'<br>').replace(
      /\[([^\]]+)\]\((https?:\/\/[^\)]+)\)/g,
      '<a href="$2" target="_blank" rel="noopener">$1</a>'
    );
    messagesEl.appendChild(div);
    messagesEl.scrollTop = messagesEl.scrollHeight;
    if (role==='bot') playPop();
  }
  function showTyping(){const div=document.createElement('div');div.className='typing';div.id='typingIndicator';div.innerHTML='<span></span><span></span><span></span>';messagesEl.appendChild(div);messagesEl.scrollTop=messagesEl.scrollHeight;}
  function removeTyping(){document.getElementById('typingIndicator')?.remove();}

  function callGL(userMsg) {
    history.push({role:'user',content:userMsg});
    showTyping();
    chrome.runtime.sendMessage({ type: 'LENS_GROQ_REQUEST', systemPrompt: SYSTEM_PROMPT, history }, (response) => {
      removeTyping();
      if (chrome.runtime.lastError || !response?.reply) {
        addMsg('bot', "I had a little hiccup — try again in a sec!");
        return;
      }
      history.push({ role: 'assistant', content: response.reply });
      addMsg('bot', response.reply);
    });
  }

  function sendMessage(){const input=document.getElementById('chatInput');const text=input.value.trim();if(!text)return;input.value='';addMsg('user',text);callGL(text);}
  function sendChip(text){addMsg('user',text);callGL(text);document.getElementById('quickChips').style.display='none';}

  document.querySelectorAll('#quickChips .chip').forEach((chip) => {
    chip.addEventListener('click', () => sendChip(chip.dataset.q || chip.textContent.trim()));
  });

  document.getElementById('proceedBtn').addEventListener('click', proceedToSite);
  document.getElementById('chatScrollBtn').addEventListener('click', scrollToChat);
  document.getElementById('chatInput').addEventListener('keydown', (event) => {
    if (event.key === 'Enter') sendMessage();
  });
  document.getElementById('sendChat').addEventListener('click', sendMessage);

  window.addEventListener('DOMContentLoaded', () => {
    playWarn();
    setTimeout(() => {
      callGL(`I just landed on your warning page. The site ${siteDomain} (${rawUrl}) triggered a warning for: ${category} — ${reason}. Please explain what this means and whether I should be careful, and suggest safe alternatives to ${siteDomain} if I'd prefer those.`);
    }, 600);
  });
</script>
</body>
</html>
