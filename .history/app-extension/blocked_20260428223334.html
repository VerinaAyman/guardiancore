<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'nonce-gl-inline'; style-src 'self' 'nonce-gl-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data:; connect-src 'self' https://api.groq.com https://api.emailjs.com https://guardiancore.onrender.com https://*.onrender.com; object-src 'none'; base-uri 'self'" />
  <title>Access Blocked · GuardianLens</title>
  <link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
    <style nonce="gl-inline">
    :root {
      --bg:         #080e1a;
      --surface:    #0f172a;
      --surface2:   #1e293b;
      --surface3:   #263045;
      --border:     rgba(99,102,241,.18);
      --border2:    rgba(255,255,255,.06);
      --accent:     #6366f1;
      --accent-glow:#818cf8;
      --danger:     #f43f5e;
      --danger-dim: rgba(244,63,94,.15);
      --warn:       #f59e0b;
      --ok:         #10b981;
      --text:       #f1f5f9;
      --muted:      #94a3b8;
      --dim:        #475569;
      --mono:       'JetBrains Mono', monospace;
      --sans:       'Sora', sans-serif;
      --radius:     14px;
      --radius-sm:  8px;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: var(--sans);
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      position: relative;
    }
    .bg-orb { position: fixed; border-radius: 50%; filter: blur(90px); pointer-events: none; z-index: 0; }
    .bg-orb-1 {
      width: 500px; height: 500px;
      background: radial-gradient(circle, rgba(244,63,94,.12) 0%, transparent 70%);
      top: -150px; left: -150px;
      animation: orbDrift1 18s ease-in-out infinite alternate;
    }
    .bg-orb-2 {
      width: 400px; height: 400px;
      background: radial-gradient(circle, rgba(99,102,241,.1) 0%, transparent 70%);
      bottom: -100px; right: -100px;
      animation: orbDrift2 22s ease-in-out infinite alternate;
    }
    @keyframes orbDrift1 { to { transform: translate(60px, 80px); } }
    @keyframes orbDrift2 { to { transform: translate(-40px, -60px); } }
    body::before {
      content: '';
      position: fixed; inset: 0; z-index: 0;
      background-image:
        linear-gradient(rgba(99,102,241,.04) 1px, transparent 1px),
        linear-gradient(90deg, rgba(99,102,241,.04) 1px, transparent 1px);
      background-size: 48px 48px;
      pointer-events: none;
    }

    .star { position: fixed; pointer-events: none; z-index: 0; opacity: 0; font-size: 1.2rem; animation: starFloat 6s ease-in-out infinite; }
    @keyframes starFloat {
      0%   { opacity: 0; transform: translateY(0) scale(.5); }
      20%  { opacity: .7; }
      80%  { opacity: .4; }
      100% { opacity: 0; transform: translateY(-120px) scale(1.2) rotate(30deg); }
    }

    .page {
      position: relative; z-index: 1;
      width: 100%; max-width: 980px;
      padding: 24px 20px;
      display: grid;
      grid-template-columns: 1fr 380px;
      gap: 16px;
      min-height: 100vh;
      align-content: center;
    }
    @media (max-width: 780px) {
      .page { grid-template-columns: 1fr; min-height: auto; padding-bottom: 40px; }
      .chat-panel { height: 420px; }
    }

    /* ── Block Card ── */
    .block-card {
      grid-column: 1;
      background: linear-gradient(135deg, rgba(15,23,42,.95), rgba(30,41,59,.9));
      border: 1px solid rgba(244,63,94,.2);
      border-radius: 20px;
      padding: 36px 32px;
      backdrop-filter: blur(20px);
      animation: cardSlideIn .5s cubic-bezier(.34,1.56,.64,1) both;
      box-shadow: 0 0 0 1px rgba(244,63,94,.08), 0 32px 64px rgba(0,0,0,.4);
    }
    @keyframes cardSlideIn {
      from { opacity: 0; transform: translateY(28px) scale(.97); }
      to   { opacity: 1; transform: translateY(0) scale(1); }
    }

    .shield-wrap { display: flex; align-items: center; gap: 16px; margin-bottom: 24px; }
    .shield {
      width: 60px; height: 60px; flex-shrink: 0; position: relative;
      animation: shieldIn .6s cubic-bezier(.34,1.56,.64,1) .1s both;
    }
    @keyframes shieldIn {
      from { opacity: 0; transform: scale(.4) rotate(-20deg); }
      to   { opacity: 1; transform: scale(1) rotate(0); }
    }
    .shield svg { width: 100%; height: 100%; }
    .shield::after {
      content: ''; position: absolute; inset: -8px; border-radius: 50%;
      background: radial-gradient(circle, rgba(244,63,94,.2), transparent 70%);
      animation: pulse 2.4s ease-in-out infinite;
    }
    @keyframes pulse { 0%,100% { transform: scale(1); opacity: .8; } 50% { transform: scale(1.35); opacity: 0; } }

    .shield-text h1 { font-size: 1.5rem; font-weight: 700; line-height: 1.2; color: var(--danger); }
    .shield-text p  { font-size: .83rem; color: var(--muted); margin-top: 5px; }
    .emphasis { color: var(--text); }

    <div class="badge danger">
      <div class="badge-dot"></div>
      <span id="badgeCategory">Loading…</span>
    </div>

    <!-- Info rows -->
    <div class="info-grid">
      <div class="info-row">
        <div class="info-icon red">🚫</div>
        <div>
          <div class="info-label">Category</div>
          <div class="info-value" id="infoCategory">—</div>
        </div>
      </div>
      <div class="info-row">
        <div class="info-icon amber">⚠️</div>
        <div>
          <div class="info-label">Reason</div>
          <div class="info-value" id="infoReason">—</div>
        </div>
      </div>
    </div>

    <!-- Blocked URL — prominent box -->
    <div class="url-box">
      <div class="url-box-label">Blocked URL</div>
      <div class="url-box-value" id="infoUrl">—</div>
    </div>

    <!-- What this means -->
    <div class="explain-box">
      <div class="explain-box-title">🔒 What does this mean?</div>
      <div class="explain-list">
        <div class="explain-item">
          <span class="explain-item-icon">🛡️</span>
          <span>GuardianLens detected that this website falls outside your family's safe browsing rules and <strong class="emphasis">blocked it before it could load</strong>.</span>
        </div>
        <div class="explain-item">
          <span class="explain-item-icon">📬</span>
          <span>Your parent has been <strong class="emphasis">automatically notified</strong> that this site was blocked.</span>
        </div>
        <div class="explain-item">
          <span class="explain-item-icon">💬</span>
          <span>GuardianLens can suggest <strong class="emphasis">safe alternatives</strong> — just ask in the chat on the right!</span>
        </div>
      </div>
    </div>

  </div>

  <!-- ── Chat Panel ── -->
  <div class="chat-panel">
    <div class="chat-header">
      <div class="chat-avatar">🛡️</div>
      <div>
        <div class="chat-title">GuardianLens</div>
        <div class="chat-sub"><span class="online-dot"></span> Online · Here to help</div>
      </div>
    </div>
    <div class="chat-messages" id="chatMessages"></div>
    <div class="chips" id="quickChips">
      <div class="chip" data-q="Why exactly was this site blocked?">Why blocked?</div>
      <div class="chip" data-q="Show me more safe alternatives please">More alternatives</div>
      <div class="chip" data-q="What can I do instead right now?">What can I do?</div>
    </div>
    <div class="chat-input-row">
      <input id="chatInput" type="text" placeholder="Ask GuardianLens anything…" autocomplete="off" />
      <button id="sendChat" type="button">➤</button>
    </div>
  </div>

  <div class="gl-footer"><strong>GuardianLens</strong> · <span>v0.7.0</span></div>
</div>

<script nonce="gl-inline">
  // ── Audio ──
  const AudioCtx = window.AudioContext || window.webkitAudioContext;
  function playChime(type = 'block') {
    try {
      const ctx = new AudioCtx();
      const freqs = type === 'block' ? [523, 415, 370] : [523, 659, 784];
      freqs.forEach((f, i) => {
        const osc = ctx.createOscillator(), gain = ctx.createGain();
        osc.connect(gain); gain.connect(ctx.destination);
        osc.type = 'sine'; osc.frequency.value = f;
        gain.gain.setValueAtTime(0, ctx.currentTime + i * 0.18);
        gain.gain.linearRampToValueAtTime(0.12, ctx.currentTime + i * 0.18 + 0.04);
        gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + i * 0.18 + 0.35);
        osc.start(ctx.currentTime + i * 0.18);
        osc.stop(ctx.currentTime + i * 0.18 + 0.36);
      });
    } catch(e) {}
  }
  function playPop() {
    try {
      const ctx = new AudioCtx(), osc = ctx.createOscillator(), gain = ctx.createGain();
      osc.connect(gain); gain.connect(ctx.destination);
      osc.type = 'sine'; osc.frequency.value = 880;
      gain.gain.setValueAtTime(0.08, ctx.currentTime);
      gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.12);
      osc.start(ctx.currentTime); osc.stop(ctx.currentTime + 0.13);
    } catch(e) {}
  }


  document.querySelectorAll('#quickChips .chip').forEach((chip) => {
    chip.addEventListener('click', () => sendChip(chip.dataset.q || chip.textContent.trim()));
  });

  document.getElementById('chatInput').addEventListener('keydown', (event) => {
    if (event.key === 'Enter') sendMessage();
  });

  // ── Floating stars ──
  const EMOJIS = ['⭐','✨','🌟','💫','🎈','🎵'];
  function spawnStar() {
    const el = document.createElement('div');
    el.className = 'star';
    el.textContent = EMOJIS[Math.floor(Math.random() * EMOJIS.length)];
    el.style.left = Math.random() * 95 + 'vw';
    el.style.top  = (60 + Math.random() * 30) + 'vh';
    el.style.animationDelay = Math.random() * 2 + 's';
    el.style.animationDuration = (5 + Math.random() * 4) + 's';
    document.body.appendChild(el);
    setTimeout(() => el.remove(), 9000);
  }
  setInterval(spawnStar, 2200);

  // ── Params ──
  const params   = new URLSearchParams(location.search);
  const category = params.get('category') || 'Restricted Content';
  const reason   = params.get('reason')   || 'This content does not meet your family safety settings.';
  const rawUrl   = params.get('url')      || document.referrer || 'Unknown';

  document.getElementById('badgeCategory').textContent = category;
  document.getElementById('infoCategory').textContent  = category;
  document.getElementById('infoReason').textContent    = reason;
  document.getElementById('infoUrl').textContent       = rawUrl;

  // ── Parent notification ──
  function notifyParent() {
    if (typeof chrome !== 'undefined' && chrome.runtime) {
      chrome.runtime.sendMessage({ type: 'PAGE_BLOCKED', payload: { url: rawUrl, category, reason } });
    }
  }

  // ── Chat ──
  const messagesEl = document.getElementById('chatMessages');
  const history = [];

  let siteDomain = rawUrl;
  try { siteDomain = new URL(rawUrl).hostname.replace('www.', ''); } catch(e) {}

  const SYSTEM_PROMPT = `You are GuardianLens, a warm and friendly AI assistant in a family safety browser extension for kids.

The child's browser just blocked this specific website:
- Full URL: ${rawUrl}
- Domain: ${siteDomain}
- Category: ${category}
- Reason: ${reason}

Your job on first message:
1. In 1-2 friendly sentences, explain why THIS specific site (${siteDomain}) was blocked. Be kind, not scary.
2. Then suggest exactly 3–5 safe alternatives that do the SAME thing as ${siteDomain}. If it's a game site, suggest similar safe game sites. If it's a video site, suggest safe video sites. Etc.
3. Format alternatives as markdown links: [Site Name](https://url.com) — one per line, with a single emoji and a 5-word description.

For follow-up questions: answer warmly and helpfully. Never be preachy. Keep it short and fun.
Never suggest ${rawUrl} or any site in the same blocked category.`;

  function addMsg(role, text) {
    const div = document.createElement('div');
    div.className = 'msg ' + role;
    div.innerHTML = text.replace(/\n/g,'<br>').replace(
      /\[([^\]]+)\]\((https?:\/\/[^\)]+)\)/g,
      '<a href="$2" target="_blank" rel="noopener">$1</a>'
    );
    messagesEl.appendChild(div);
    messagesEl.scrollTop = messagesEl.scrollHeight;
    if (role === 'bot') playPop();
  }

  function showTyping() {
    const div = document.createElement('div');
    div.className = 'typing'; div.id = 'typingIndicator';
    div.innerHTML = '<span></span><span></span><span></span>';
    messagesEl.appendChild(div);
    messagesEl.scrollTop = messagesEl.scrollHeight;
  }
  function removeTyping() { document.getElementById('typingIndicator')?.remove(); }

  function callGL(userMsg) {
    history.push({ role: 'user', content: userMsg });
    showTyping();
    chrome.runtime.sendMessage({ type: 'LENS_GROQ_REQUEST', systemPrompt: SYSTEM_PROMPT, history }, (response) => {
      removeTyping();
      if (chrome.runtime.lastError || !response?.reply) {
        addMsg('bot', "I had a little hiccup — try again in a sec!");
        return;
      }
      history.push({ role: 'assistant', content: response.reply });
      addMsg('bot', response.reply);
    });
  }

  function sendMessage() {
    const input = document.getElementById('chatInput');
    const text = input.value.trim();
    if (!text) return;
    input.value = '';
    addMsg('user', text);
    callGL(text);
  }

  function sendChip(text) {
    addMsg('user', text);
    callGL(text);
    document.getElementById('quickChips').style.display = 'none';
  }

  // ── Init ──
  window.addEventListener('DOMContentLoaded', () => {
    playChime('block');
    notifyParent();
    setTimeout(() => {
      callGL(`I just landed on your blocked page. The site ${siteDomain} (${rawUrl}) was blocked for: ${category} — ${reason}. Please explain briefly why and suggest safe alternatives to ${siteDomain} specifically.`);
    }, 600);
  });
</script>
</body>
</html>
