<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Lens — GuardianCore</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&display=swap');

    * { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --p: #6C63FF;
      --pd: #3C3489;
      --pl: #EEEDFE;
      --warn: #FF7043;
      --danger: #E53935;
      --ok: #00BFA5;
      --bg: #F4F3FF;
      --sur: #ffffff;
      --tx: #1a1a2e;
      --mu: #888;
      --fn: 'Nunito', system-ui, sans-serif;
    }

    html, body {
      height: 100%;
      font-family: var(--fn);
      background: var(--bg);
      color: var(--tx);
      -webkit-font-smoothing: antialiased;
    }

    body {
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 16px;
      min-height: 100vh;
    }

    .layout {
      width: 100%;
      max-width: 420px;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .topstrip {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 12px 16px;
      background: var(--sur);
      border-radius: 16px;
      border: 1px solid rgba(108,99,255,0.12);
    }
    .strip-icon {
      width: 38px; height: 38px;
      border-radius: 50%;
      background: var(--pl);
      display: flex; align-items: center; justify-content: center;
      font-size: 18px; flex-shrink: 0;
    }
    .strip-meta { flex: 1; }
    .strip-title { font-size: 14px; font-weight: 800; color: var(--tx); }
    .strip-sub { font-size: 11px; color: var(--mu); }
    .strip-badge {
      font-size: 11px; font-weight: 700;
      padding: 3px 10px;
      border-radius: 20px;
      background: rgba(229,57,53,0.1);
      color: var(--danger);
      border: 1px solid rgba(229,57,53,0.2);
    }
    .strip-badge.warn {
      background: rgba(255,112,67,0.1);
      color: var(--warn);
      border-color: rgba(255,112,67,0.25);
    }

    .chat-card {
      background: var(--sur);
      border-radius: 20px;
      border: 1px solid rgba(108,99,255,0.12);
      overflow: hidden;
      display: flex;
      flex-direction: column;
    }

    .chat-topbar {
      background: var(--p);
      padding: 12px 16px;
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .chat-av {
      width: 34px; height: 34px; border-radius: 50%;
      background: rgba(255,255,255,0.2);
      display: flex; align-items: center; justify-content: center;
      font-size: 17px; flex-shrink: 0;
    }
    .chat-meta { flex: 1; }
    .chat-name { font-size: 14px; font-weight: 800; color: #fff; }
    .chat-sub  { font-size: 10px; color: rgba(255,255,255,0.7); }
    .online-dot {
      width: 8px; height: 8px; border-radius: 50%;
      background: #00E676;
      box-shadow: 0 0 5px #00E676;
    }

    #chat-box {
      min-height: 260px;
      max-height: 300px;
      overflow-y: auto;
      padding: 12px 10px;
      display: flex;
      flex-direction: column;
      gap: 8px;
      background: var(--bg);
    }
    #chat-box::-webkit-scrollbar { width: 4px; }
    #chat-box::-webkit-scrollbar-thumb { background: rgba(108,99,255,0.2); border-radius: 4px; }

    .msg-row { display: flex; gap: 6px; align-items: flex-end; }
    .msg-row.bot { flex-direction: row; }
    .msg-row.user { flex-direction: row-reverse; }
    .msg-av {
      width: 28px; height: 28px; border-radius: 50%;
      background: var(--pl);
      display: flex; align-items: center; justify-content: center;
      font-size: 14px; flex-shrink: 0;
    }
    .msg-bub {
      max-width: 82%; padding: 9px 13px;
      font-size: 13.5px; line-height: 1.55;
      border-radius: 18px; word-break: break-word;
    }
    .msg-row.bot .msg-bub {
      background: var(--sur); color: var(--tx);
      border-bottom-left-radius: 4px;
      border: 1px solid rgba(108,99,255,0.1);
    }
    .msg-row.user .msg-bub {
      background: var(--p); color: #fff;
      border-bottom-right-radius: 4px;
    }

    .escalate-bub {
      background: #FFEBEE;
      border: 1.5px solid var(--danger);
      border-radius: 16px;
      padding: 10px 13px;
      font-size: 13px;
      line-height: 1.5;
      max-width: 88%;
    }
    .escalate-tag {
      font-size: 10px; font-weight: 800;
      color: var(--danger);
      text-transform: uppercase;
      letter-spacing: 0.6px;
      margin-bottom: 4px;
    }
    .escalate-body { color: #7f0000; }

    .typing {
      display: flex; gap: 4px; align-items: center;
      background: var(--sur);
      border: 1px solid rgba(108,99,255,0.1);
      border-radius: 18px; border-bottom-left-radius: 4px;
      padding: 10px 14px; max-width: 60px;
    }
    .typing span {
      width: 6px; height: 6px; border-radius: 50%;
      background: var(--p); opacity: 0.4;
      animation: blink 1.2s infinite;
    }
    .typing span:nth-child(2) { animation-delay: 0.2s; }
    .typing span:nth-child(3) { animation-delay: 0.4s; }
    @keyframes blink { 0%,80%,100%{opacity:0.3;} 40%{opacity:1;} }

    .chat-inputbar {
      background: var(--sur);
      border-top: 1px solid rgba(108,99,255,0.1);
      padding: 9px 10px;
      display: flex;
      gap: 7px;
      align-items: center;
    }
    #chat-input {
      flex: 1;
      background: var(--bg);
      border: 1.5px solid rgba(108,99,255,0.15);
      border-radius: 20px;
      padding: 8px 14px;
      font-size: 13.5px;
      font-family: var(--fn);
      color: var(--tx);
      outline: none;
      transition: border 0.15s;
    }
    #chat-input:focus { border-color: var(--p); }
    #chat-input:disabled { opacity: 0.5; }
    #send-btn {
      width: 36px; height: 36px; border-radius: 50%;
      background: var(--p); border: none;
      cursor: pointer; display: flex; align-items: center; justify-content: center;
      font-size: 15px; color: #fff; flex-shrink: 0;
      transition: background 0.15s;
    }
    #send-btn:hover { background: var(--pd); }
    #send-btn:disabled { opacity: 0.4; pointer-events: none; }

    .actions {
      display: flex;
      gap: 8px;
    }
    .btn {
      flex: 1;
      padding: 12px 10px;
      border-radius: 12px;
      font-size: 13px;
      font-weight: 700;
      font-family: var(--fn);
      cursor: pointer;
      border: none;
      transition: opacity 0.15s;
    }
    .btn:hover { opacity: 0.85; }
    .btn-back { background: var(--ok); color: #fff; }
    .btn-home { background: var(--pl); color: var(--pd); }

    .footer {
      text-align: center;
      font-size: 10px;
      letter-spacing: 0.15em;
      color: var(--mu);
      text-transform: uppercase;
    }
  </style>
</head>
<body>

<div class="layout">

  <div class="topstrip">
    <div class="strip-icon">🛡</div>
    <div class="strip-meta">
      <div class="strip-title" id="blocked-domain">This page was blocked</div>
      <div class="strip-sub">GuardianCore · content protection</div>
    </div>
    <div class="strip-badge" id="category-badge">Restricted</div>
  </div>

  <div class="chat-card">
    <div class="chat-topbar">
      <div class="chat-av">🛡</div>
      <div class="chat-meta">
        <div class="chat-name">Lens — your web buddy</div>
        <div class="chat-sub">here to explain & help</div>
      </div>
      <div class="online-dot"></div>
    </div>

    <div id="chat-box"></div>

    <div class="chat-inputbar">
      <input id="chat-input" type="text" placeholder="Ask Lens anything…" autocomplete="off" />
      <button id="send-btn">➤</button>
    </div>
  </div>

  <div class="actions">
    <button class="btn btn-back" id="btn-back">← Go back</button>
    <button class="btn btn-home" id="btn-home">🏠 Go to Google</button>
  </div>

  <p class="footer">GuardianCore · safer browsing, clearly explained</p>

</div>

<script src="blocked.js" defer></script>
</body>
</html>
