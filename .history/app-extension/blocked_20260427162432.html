<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>GuardianLens — Page Blocked</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&display=swap');

    * { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --gl-safe:    #22c55e;
      --gl-warn:    #f59e0b;
      --gl-block:   #ef4444;
      --gl-accent:  #6366f1;
      --gl-bg:      #0f172a;
      --gl-surface: #1e293b;
      --gl-surface2:#263347;
      --gl-text:    #f1f5f9;
      --gl-muted:   #94a3b8;
      --gl-border:  rgba(255,255,255,0.08);
      --gl-font:    'Nunito', 'Segoe UI', sans-serif;
      --gl-radius:  20px;
      --gl-shadow:  0 8px 40px rgba(0,0,0,0.6);
    }

    html, body {
      height: 100%;
      font-family: var(--gl-font);
      background: var(--gl-bg);
      color: var(--gl-text);
      -webkit-font-smoothing: antialiased;
    }

    body {
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 16px;
      min-height: 100vh;
      background:
        radial-gradient(ellipse at 20% 20%, rgba(99,102,241,0.12) 0%, transparent 55%),
        radial-gradient(ellipse at 80% 80%, rgba(239,68,68,0.10) 0%, transparent 55%),
        var(--gl-bg);
    }

    /* Stars */
    .stars {
      position: fixed; inset: 0; pointer-events: none; z-index: 0; overflow: hidden;
    }
    .star {
      position: absolute; border-radius: 50%;
      background: rgba(255,255,255,0.6);
      animation: twinkle var(--d, 3s) ease-in-out infinite var(--delay, 0s);
    }
    @keyframes twinkle { 0%,100%{opacity:0.2;} 50%{opacity:0.9;} }

    .layout {
      position: relative; z-index: 1;
      width: 100%; max-width: 440px;
      display: flex; flex-direction: column; gap: 16px;
    }

    /* Top strip */
    .topstrip {
      display: flex; align-items: center; gap: 12px;
      padding: 14px 18px;
      background: var(--gl-surface);
      border-radius: var(--gl-radius);
      border: 1px solid var(--gl-border);
      box-shadow: var(--gl-shadow);
    }
    .strip-icon {
      width: 42px; height: 42px; border-radius: 50%;
      background: rgba(239,68,68,0.15);
      border: 1.5px solid rgba(239,68,68,0.3);
      display: flex; align-items: center; justify-content: center;
      font-size: 20px; flex-shrink: 0;
    }
    .strip-meta { flex: 1; }
    .strip-title { font-size: 14px; font-weight: 900; color: var(--gl-text); }
    .strip-sub   { font-size: 11px; color: var(--gl-muted); margin-top: 1px; }
    .strip-badge {
      font-size: 11px; font-weight: 800;
      padding: 4px 12px; border-radius: 20px;
      background: rgba(239,68,68,0.15);
      color: var(--gl-block);
      border: 1px solid rgba(239,68,68,0.3);
      white-space: nowrap;
    }

    /* Big Cute Owl */
    .big-owl-container {
      display: flex;
      justify-content: center;
      margin: 10px 0;
    }
    .big-owl {
      width: 120px;
      height: 120px;
      filter: drop-shadow(0 12px 25px rgba(0,0,0,0.45));
      animation: gl-owl-bounce-in 0.75s cubic-bezier(0.34,1.56,0.64,1) both,
                 gl-owl-frustrated 1.2s ease-in-out 0.9s 2;
    }

    /* Chat card */
    .chat-card {
      background: var(--gl-surface);
      border-radius: var(--gl-radius);
      border: 1px solid var(--gl-border);
      box-shadow: var(--gl-shadow);
      overflow: hidden;
      display: flex; flex-direction: column;
    }

    .chat-topbar {
      background: linear-gradient(135deg, #4338ca, var(--gl-accent));
      padding: 14px 18px;
      display: flex; align-items: center; gap: 12px;
    }
    .chat-meta { flex: 1; }
    .chat-name { font-size: 14px; font-weight: 900; color: #fff; }
    .chat-sub  { font-size: 10px; color: rgba(255,255,255,0.65); }

    #chat-box {
      min-height: 220px; max-height: 280px;
      overflow-y: auto;
      padding: 14px 12px;
      display: flex; flex-direction: column; gap: 10px;
      background: var(--gl-bg);
    }
    #chat-box::-webkit-scrollbar { width: 4px; }
    #chat-box::-webkit-scrollbar-thumb { background: rgba(99,102,241,0.25); border-radius: 4px; }

    .msg-row { display: flex; gap: 8px; align-items: flex-end; }
    .msg-row.bot  { flex-direction: row; }
    .msg-row.user { flex-direction: row-reverse; }
    .msg-av {
      width: 28px; height: 28px; border-radius: 50%;
      background: rgba(99,102,241,0.15);
      border: 1px solid rgba(99,102,241,0.2);
      display: flex; align-items: center; justify-content: center;
      font-size: 14px; flex-shrink: 0;
    }
    .msg-bub {
      max-width: 82%; padding: 10px 14px;
      font-size: 13.5px; line-height: 1.55;
      border-radius: 18px; word-break: break-word;
      font-family: var(--gl-font); font-weight: 600;
    }
    .msg-row.bot .msg-bub {
      background: var(--gl-surface);
      color: var(--gl-text);
      border-bottom-left-radius: 4px;
      border: 1px solid var(--gl-border);
    }
    .msg-row.user .msg-bub {
      background: var(--gl-accent);
      color: #fff;
      border-bottom-right-radius: 4px;
    }

    .typing {
      display: flex; gap: 4px; align-items: center;
      background: var(--gl-surface);
      border: 1px solid var(--gl-border);
      border-radius: 18px; border-bottom-left-radius: 4px;
      padding: 10px 14px; max-width: 60px;
    }
    .typing span {
      width: 6px; height: 6px; border-radius: 50%;
      background: var(--gl-accent); opacity: 0.4;
      animation: blink 1.2s infinite;
    }
    .typing span:nth-child(2) { animation-delay: 0.2s; }
    .typing span:nth-child(3) { animation-delay: 0.4s; }
    @keyframes blink { 0%,80%,100%{opacity:0.3;} 40%{opacity:1;} }

    .chat-inputbar {
      background: var(--gl-surface);
      border-top: 1px solid var(--gl-border);
      padding: 10px 12px;
      display: flex; gap: 8px; align-items: center;
    }
    #chat-input {
      flex: 1;
      background: var(--gl-surface2);
      border: 1.5px solid var(--gl-border);
      border-radius: 20px;
      padding: 9px 16px;
      font-size: 13.5px;
      font-family: var(--gl-font);
      font-weight: 600;
      color: var(--gl-text);
      outline: none;
    }
    #chat-input:focus { border-color: var(--gl-accent); }

    #send-btn {
      width: 38px; height: 38px; border-radius: 50%;
      background: var(--gl-accent); border: none;
      cursor: pointer; display: flex; align-items: center; justify-content: center;
      font-size: 16px; color: #fff;
      box-shadow: 0 2px 12px rgba(99,102,241,0.4);
    }
    #send-btn:hover  { background: #4f46e5; transform: scale(1.05); }
    #send-btn:active { transform: scale(0.95); }

    /* Action buttons */
    .actions { display: flex; gap: 10px; }
    .btn {
      flex: 1; padding: 13px 10px;
      border-radius: 14px;
      font-size: 13.5px; font-weight: 800;
      font-family: var(--gl-font);
      cursor: pointer; border: none;
      transition: all 0.15s;
    }
    .btn-back { background: var(--gl-safe); color: #fff; }
    .btn-home { background: var(--gl-surface); color: var(--gl-text); border: 1px solid var(--gl-border); }

    .footer {
      text-align: center;
      font-size: 10px; letter-spacing: 0.15em;
      color: var(--gl-muted);
      text-transform: uppercase;
      font-weight: 700;
    }

    /* Animations */
    @keyframes gl-owl-bounce-in {
      0%   { transform: scale(0) rotate(-15deg); opacity: 0; }
      55%  { transform: scale(1.15) rotate(4deg); opacity: 1; }
      100% { transform: scale(1) rotate(0deg); opacity: 1; }
    }
    @keyframes gl-owl-frustrated {
      0%,100% { transform: translateX(0) rotate(0deg); }
      10%     { transform: translateX(-6px) rotate(-4deg); }
      20%     { transform: translateX(6px) rotate(4deg); }
      30%     { transform: translateX(-4px) rotate(-3deg); }
      40%     { transform: translateX(4px) rotate(3deg); }
      60%,100%{ transform: translateX(0) rotate(0deg); }
    }
  </style>
</head>
<body>

<!-- Star field -->
<div class="stars" id="stars"></div>

<div class="layout">

  <div class="topstrip">
    <div class="strip-icon">🛡️</div>
    <div class="strip-meta">
      <div class="strip-title" id="blocked-domain">This page was blocked</div>
      <div class="strip-sub">GuardianLens · keeping you safe</div>
    </div>
    <div class="strip-badge" id="category-badge">Restricted</div>
  </div>

  <!-- Big Cute Owl -->
  <div class="big-owl-container">
    <div id="big-owl" class="big-owl"></div>
  </div>

  <div class="chat-card">
    <div class="chat-topbar">
      <div class="chat-meta">
        <div class="chat-name">Lens 🦉 — your web buddy</div>
        <div class="chat-sub">I'm really sorry... this page isn't safe for you</div>
      </div>
    </div>

    <div id="chat-box"></div>

    <div class="chat-inputbar">
      <input id="chat-input" type="text" placeholder="Ask Lens anything…" autocomplete="off" />
      <button id="send-btn">➤</button>
    </div>
  </div>

  <div class="actions">
    <button class="btn btn-back" id="btn-back">← Go back</button>
    <button class="btn btn-home" id="btn-home">🏠 Go to Google</button>
  </div>

  <p class="footer">GuardianLens · safer browsing, clearly explained</p>

</div>

<script>
  // ── Star field ──
  const starsEl = document.getElementById('stars');
  for (let i = 0; i < 55; i++) {
    const s = document.createElement('div');
    s.className = 'star';
    const size = Math.random() * 2.5 + 1;
    s.style.cssText = `
      width:${size}px; height:${size}px;
      left:${Math.random()*100}%; top:${Math.random()*100}%;
      --d:${(Math.random()*3+2).toFixed(1)}s;
      --delay:-${(Math.random()*4).toFixed(1)}s;
    `;
    starsEl.appendChild(s);
  }

  // ── Cute Owl SVG (same as content-script — child-friendly version) ──
  function owlSVG(mood) {
    const c = {
      body: '#f87171', belly: '#fee2e2', eye: '#991b1b', brow: '#b91c1c',
      cheek: '#fca5a5', pupil: '#3b0101'
    };

    const browL = 'M 26 33 Q 34 29 42 33';
    const browR = 'M 58 33 Q 66 29 74 33';
    const mouth = 'M 41 70 Q 50 66 59 70';   // soft gentle pout

    return `<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="120" height="120">
      <defs>
        <radialGradient id="owlBody" cx="50%" cy="40%" r="65%">
          <stop offset="0%" stop-color="${c.belly}"/>
          <stop offset="100%" stop-color="${c.body}"/>
        </radialGradient>
      </defs>

      <!-- Body -->
      <ellipse cx="50" cy="65" rx="33" ry="31" fill="url(#owlBody)"/>
      <!-- Wings -->
      <ellipse cx="18" cy="68" rx="13" ry="11" fill="${c.body}" opacity="0.85" transform="rotate(-30 18 68)"/>
      <ellipse cx="82" cy="68" rx="13" ry="11" fill="${c.body}" opacity="0.85" transform="rotate(30 82 68)"/>

      <!-- Ear tufts -->
      <ellipse cx="31" cy="24" rx="10" ry="13" fill="${c.body}" transform="rotate(-20 31 24)"/>
      <ellipse cx="69" cy="24" rx="10" ry="13" fill="${c.body}" transform="rotate(20 69 24)"/>

      <!-- Big friendly eyes -->
      <ellipse cx="33" cy="48" rx="15" ry="16" fill="#fff"/>
      <ellipse cx="67" cy="48" rx="15" ry="16" fill="#fff"/>

      <!-- Iris -->
      <ellipse cx="33" cy="48" rx="10" ry="11" fill="${c.eye}"/>
      <ellipse cx="67" cy="48" rx="10" ry="11" fill="${c.eye}"/>

      <!-- Big pupils -->
      <circle cx="33" cy="50" r="6.5" fill="${c.pupil}"/>
      <circle cx="67" cy="50" r="6.5" fill="${c.pupil}"/>

      <!-- Eye shine -->
      <circle cx="36" cy="47" r="2.2" fill="#fff" opacity="0.9"/>
      <circle cx="70" cy="47" r="2.2" fill="#fff" opacity="0.9"/>

      <!-- Soft cheeks -->
      <ellipse cx="20" cy="58" rx="9" ry="7" fill="${c.cheek}" opacity="0.65"/>
      <ellipse cx="80" cy="58" rx="9" ry="7" fill="${c.cheek}" opacity="0.65"/>

      <!-- Friendly beak -->
      <path d="M45 62 Q50 68 55 62" fill="#fb923c"/>
      <ellipse cx="50" cy="62" rx="6" ry="4" fill="#f97316"/>

      <!-- Eyebrows (gentle pout) -->
      <path d="${browL}" stroke="${c.brow}" stroke-width="4.5" stroke-linecap="round" fill="none"/>
      <path d="${browR}" stroke="${c.brow}" stroke-width="4.5" stroke-linecap="round" fill="none"/>

      <!-- Mouth -->
      <path d="${mouth}" stroke="${c.brow}" stroke-width="3" stroke-linecap="round" fill="none" opacity="0.8"/>

      <!-- Little steam puffs (cute frustrated mood) -->
      <g opacity="0.9">
        <circle cx="77" cy="21" r="4" fill="none" stroke="#fb923c" stroke-width="2.5"/>
        <circle cx="85" cy="18" r="2.5" fill="none" stroke="#fb923c" stroke-width="2"/>
      </g>
    </svg>`;
  }

  // ── Populate blocked page ──
  const params = new URLSearchParams(location.search);
  const category = params.get('category') || 'Restricted content';
  const reason = params.get('reason') || '';
  const blockedUrl = params.get('url') || '';

  let domain = 'This page';
  try { domain = new URL(blockedUrl).hostname.replace(/^www\./, ''); } catch {}

  document.getElementById('blocked-domain').textContent = domain || 'This page was blocked';
  document.getElementById('category-badge').textContent = category;

  // Insert big cute owl
  document.getElementById('big-owl').innerHTML = owlSVG('block');

  // Gentle block sound on load
  try {
    const ctx = new (window.AudioContext || window.webkitAudioContext)();
    const osc = ctx.createOscillator();
    osc.type = 'sawtooth';
    osc.frequency.setValueAtTime(260, ctx.currentTime);
    const gain = ctx.createGain();
    gain.gain.setValueAtTime(0.13, ctx.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.8);
    osc.connect(gain).connect(ctx.destination);
    osc.start();
    osc.stop(ctx.currentTime + 0.9);
  } catch (e) { console.log("Sound skipped"); }

  // Action buttons
  document.getElementById('btn-back').addEventListener('click', () => {
    if (history.length > 1) history.back();
    else window.close();
  });
  document.getElementById('btn-home').addEventListener('click', () => {
    window.location.href = 'https://www.google.com';
  });

  // Chat functionality (same as before)
  const chatBox = document.getElementById('chat-box');
  const input = document.getElementById('chat-input');
  const sendBtn = document.getElementById('send-btn');

  function addMsg(text, who = 'bot') {
    const row = document.createElement('div');
    row.className = `msg-row ${who}`;
    const av = document.createElement('div');
    av.className = 'msg-av';
    av.textContent = who === 'bot' ? '🦉' : '🧒';
    const bub = document.createElement('div');
    bub.className = 'msg-bub';
    bub.textContent = text;
    row.append(av, bub);
    chatBox.appendChild(row);
    chatBox.scrollTop = chatBox.scrollHeight;
  }

  function showTyping() {
    const row = document.createElement('div');
    row.className = 'msg-row bot'; row.id = 'typing-row';
    const av = document.createElement('div'); av.className = 'msg-av'; av.textContent = '🦉';
    const t = document.createElement('div');
    t.className = 'typing';
    t.innerHTML = '<span></span><span></span><span></span>';
    row.append(av, t);
    chatBox.appendChild(row);
    chatBox.scrollTop = chatBox.scrollHeight;
  }

  function removeTyping() {
    document.getElementById('typing-row')?.remove();
  }

  const openingMsg = reason 
    ? `Hey... 🦉 I had to block ${domain} because: ${reason}. I'm sorry if that surprised you. What would you like to know?`
    : `Hey... 🦉 I blocked this page to keep you safe. It was flagged as "${category}". Want to talk about it?`;

  setTimeout(() => addMsg(openingMsg), 400);

  async function sendChat() {
    const text = input.value.trim();
    if (!text) return;
    addMsg(text, 'user');
    input.value = '';
    input.disabled = true;
    sendBtn.disabled = true;
    showTyping();

    try {
      const reply = await new Promise((resolve) => {
        chrome.runtime.sendMessage({
          type: 'LENS_GROQ_REQUEST',
          systemPrompt: `You are Lens 🦉, a very kind and friendly owl buddy for kids. You blocked ${domain} because it was "${category}". ${reason ? 'Reason: ' + reason : ''}. Be warm, simple, and comforting. Use emojis. Keep answers short.`,
          history: [{ role: 'user', content: text }]
        }, (res) => {
          resolve(res?.reply || "I'm having a little trouble connecting right now... but I'm still your friend! 💙");
        });
      });
      removeTyping();
      addMsg(reply);
    } catch {
      removeTyping();
      addMsg("I'm having trouble connecting... You can always ask a grown-up for help! 💙");
    } finally {
      input.disabled = false;
      sendBtn.disabled = false;
      input.focus();
    }
  }

  sendBtn.addEventListener('click', sendChat);
  input.addEventListener('keydown', (e) => { if (e.key === 'Enter') sendChat(); });
</script>

</body>
</html>
