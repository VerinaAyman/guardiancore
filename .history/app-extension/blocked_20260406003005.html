<!doctype html>
<html>
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Content Blocked - GuardianLens</title>
    <style>
      :root { --bg:#0f172a; --accent:#6366f1; --panel:#1e293b; --danger:#ef4444; --warn:#f59e0b; --radius:20px; --text:#f1f5f9; --text-dim:#94a3b8; }
      * { box-sizing:border-box; }
      body { margin:0; font-family: system-ui,-apple-system,'Segoe UI',Roboto,sans-serif; min-height:100vh; display:flex; align-items:center; justify-content:center; background:#0f172a; color:var(--text); -webkit-font-smoothing:antialiased; }
      .container { width:100%; max-width:600px; background:#1e293b; border:1px solid #243445; border-radius:var(--radius); padding:48px; }
      h1 { margin:0 0 8px; font-size:32px; font-weight:700; color:#fff; }
      .subtitle { font-size:14px; color:var(--text-dim); margin:0 0 32px; letter-spacing:.1em; text-transform:uppercase; }
      .category { display:inline-block; padding:6px 16px; font-size:12px; font-weight:600; letter-spacing:.15em; text-transform:uppercase; border-radius:40px; background:rgba(99,102,241,.15); color:#818cf8; border:1px solid rgba(99,102,241,.35); margin:0 0 28px; }
      .message-box { border-radius:14px; padding:20px 22px; margin:0 0 16px; font-size:15px; line-height:1.6; }
      .child-box { background:#1a2e1a; border:1px solid rgba(34,197,94,.3); color:#86efac; }
      .child-box strong { display:block; font-size:11px; letter-spacing:.2em; text-transform:uppercase; color:#4ade80; margin:0 0 8px; }
      .parent-box { background:#1e1a2e; border:1px solid rgba(99,102,241,.3); color:#c4b5fd; }
      .parent-box strong { display:block; font-size:11px; letter-spacing:.2em; text-transform:uppercase; color:#a78bfa; margin:0 0 8px; }
      .stage-box { background:#1e2a1e; border:1px solid rgba(245,158,11,.3); border-radius:14px; padding:14px 20px; font-size:13px; color:#fcd34d; margin:0 0 28px; }
      button { appearance:none; border:none; background:#6366f1; color:#fff; font-size:15px; font-weight:600; padding:14px 28px; border-radius:12px; cursor:pointer; margin-top:24px; transition:.2s; }
      button:hover { background:#4f46e5; }
      footer { margin-top:32px; text-align:center; font-size:11px; letter-spacing:.2em; color:#475569; text-transform:uppercase; }
    </style>
  </head>
  <body>
    <div class="container">
      <h1>Content Blocked</h1>
      <p class="subtitle">GuardianLens AI Safety Pipeline</p>
      <div class="category" id="category">Restricted Content</div>

      <div class="message-box child-box">
        <strong>For you</strong>
        <span id="child-message">We noticed something on this page that might not be suitable.</span>
      </div>

      <div class="message-box parent-box" id="parent-box">
        <strong>Parent report</strong>
        <span id="parent-report"></span>
      </div>

      <div class="stage-box" id="stage-box"></div>

      <button onclick="history.back()">Go Back</button>
      <footer><span>GuardianLens</span> — safer browsing, clearly explained.</footer>
    </div>
    <script src="blocked.js"></script>
    
  </body>
</html>
