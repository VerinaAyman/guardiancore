services:
  db:
    image: postgres:15
    environment:
      POSTGRES_USER: gc_user
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: guardiancore
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  backend:
    build:
      context: ./backend
    env_file:
      - ./backend/.env
    ports:
      - "8000:8000"
    dns:
      - 8.8.8.8
      - 1.1.1.1
    depends_on:
      - db

volumes:
  postgres_data:
