services:
  db:
    image: postgres:16
    environment:
      POSTGRES_DB: guardiancore
      POSTGRES_USER: gc_user
      POSTGRES_PASSWORD: gc_pass
    ports: ["5432:5432"]
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U gc_user -d guardiancore"]
      interval: 5s
      timeout: 3s
      retries: 10

  backend:
    build:
      context: ./backend
    env_file:
      - ./backend/.env
    depends_on:
      db:
        condition: service_healthy
    ports: ["8000:8000"]

volumes:
  pgdata:
